<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 350px; padding: 15px; background: #0f172a; color: white; font-family: sans-serif; }
        textarea { width: 100%; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 15px; font-size: 0.9rem; line-height: 1.4; color: #cbd5e1; }
        .loader { display: none; text-align: center; margin-top: 10px; color: #818cf8; }
    </style>
</head>
<body>
    <h3>🛡️ JobShield AI</h3>
    <textarea id="text" rows="5" placeholder="Paste job text here..."></textarea>
    <button id="check">Analyze with AI</button>
    <div id="loader" class="loader">Analyzing...</div>
    <div id="result"></div>
    <script src="popup.js"></script>
</body>
</html>
